<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Natürlich für Tiere</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="forest-bg">
        <div class="tree tree-1">🌲</div>
        <div class="tree tree-2">🌲</div>
        <div class="fireflies"></div>
    </div>

    <header>
        <nav class="navigation">
            <div class="logo">
                <span class="logo-symbol">🌿</span>
                <span class="logo-main">Natürlich für Tiere</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Startseite</a></li>
                <li><a href="anmelden.html">Registrieren</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="auth-section">
            <div class="auth-container">
                <div class="auth-header">
                    <div class="auth-animals">
                        <span>🦊</span><span>🦌</span><span>🦉</span>
                    </div>
                    <h2>Willkommen zurück!</h2>
                    <p>Loggen Sie sich ein</p>
                </div>
                
                <form class="auth-form">
                    <div class="form-group">
                        <label>📧 E-Mail</label>
                        <input type="email" required placeholder="ihre@email.de">
                    </div>

                    <div class="form-group">
                        <label>🔒 Passwort</label>
                        <input type="password" required placeholder="Ihr Passwort">
                    </div>

                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox"> Angemeldet bleiben
                        </label>
                        <a href="#" class="forgot">Passwort vergessen?</a>
                    </div>

                    <button type="submit" class="btn-submit">🌿 Einloggen</button>
                </form>

                <div class="auth-footer">
                    <p>Noch kein Konto? <a href="anmelden.html">Jetzt registrieren</a></p>
                </div>
            </div>
        </section>
    </main>

    <script>
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 5 + 's';
            particlesContainer.appendChild(particle);
        }
    </script>
</body>
</html>
